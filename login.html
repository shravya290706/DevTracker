<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpenseTrack — Login</title>
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

  <div class="auth-wrapper">

    <div class="auth-left">
      <div class="auth-brand">
        <span>💸</span>
        <h1>ExpenseTrack</h1>
      </div>
      <p class="auth-tagline">Track your spending.<br>Stay in control.</p>
      <ul class="auth-features">
        <li>✅ Real-time expense tracking</li>
        <li>✅ Monthly budget alerts</li>
        <li>✅ Category breakdown charts</li>
        <li>✅ Export to CSV</li>
      </ul>
    </div>

    <div class="auth-right">
      <div class="auth-card">

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="tab active" id="loginTab">Login</button>
          <button class="tab" id="signupTab">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@email.com" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-auth">Login</button>
          <p class="auth-msg" id="loginMsg"></p>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display:none">
          <div class="field">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@email.com" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" required>
          </div>
          <button type="submit" class="btn-auth">Create Account</button>
          <p class="auth-msg" id="signupMsg"></p>
        </form>

      </div>
    </div>

  </div>

  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
