<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>💸 Expense Tracker</h1>
    </header>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="summary-card">
        <span>Total Spent</span>
        <strong id="totalAmount">$0.00</strong>
      </div>
      <div class="summary-card">
        <span>Expenses</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="summary-card budget-card">
        <span>Budget Left</span>
        <strong id="budgetLeft">—</strong>
      </div>
    </div>

    <!-- Budget Section -->
    <div class="budget-section">
      <input type="number" id="budgetInput" placeholder="Set monthly budget (e.g. 500)" min="0" step="0.01">
      <button id="setBudgetBtn">Set Budget</button>
    </div>
    <div class="budget-bar-wrap" id="budgetBarWrap" style="display:none">
      <div class="budget-bar">
        <div class="budget-bar-fill" id="budgetBarFill"></div>
      </div>
      <span id="budgetWarning" class="budget-warning"></span>
    </div>

    <!-- Add Expense Form -->
    <div class="form-section">
      <input type="text" id="descInput" placeholder="Description (e.g. Coffee)">
      <input type="number" id="amountInput" placeholder="Amount (e.g. 4.50)" min="0" step="0.01">
      <select id="categoryInput">
        <option value="Food">🍔 Food</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Health">💊 Health</option>
        <option value="Other">📦 Other</option>
      </select>
      <input type="date" id="dateInput">
      <button id="addBtn">+ Add Expense</button>
    </div>

    <!-- Filters & Sort -->
    <div class="filter-section">
      <select id="filterCategory">
        <option value="All">All Categories</option>
        <option value="Food">🍔 Food</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Health">💊 Health</option>
        <option value="Other">📦 Other</option>
      </select>
      <input type="month" id="filterMonth">
      <select id="sortBy">
        <option value="date-desc">Newest First</option>
        <option value="date-asc">Oldest First</option>
        <option value="amount-desc">Highest Amount</option>
        <option value="amount-asc">Lowest Amount</option>
      </select>
      <button id="clearFilter">Clear</button>
      <button id="exportBtn">⬇ Export CSV</button>
    </div>

    <!-- Category Breakdown -->
    <div class="breakdown" id="breakdown"></div>

    <!-- Expense List -->
    <ul id="expenseList"></ul>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Edit Expense</h2>
      <input type="text" id="editDesc" placeholder="Description">
      <input type="number" id="editAmount" placeholder="Amount" min="0" step="0.01">
      <select id="editCategory">
        <option value="Food">🍔 Food</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Health">💊 Health</option>
        <option value="Other">📦 Other</option>
      </select>
      <input type="date" id="editDate">
      <div class="modal-actions">
        <button id="saveEditBtn">Save</button>
        <button id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
