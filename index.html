<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpenseTrack</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="toast" class="toast"></div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>💸</span>
      <h1>ExpenseTrack</h1>
    </div>

    <!-- Summary -->
    <div class="stat-card card-blue">
      <p>Total Spent</p>
      <strong id="totalAmount">$0.00</strong>
    </div>
    <div class="stat-card card-purple">
      <p>Expenses</p>
      <strong id="totalCount">0</strong>
    </div>
    <div class="stat-card card-green">
      <p>Budget Left</p>
      <strong id="budgetLeft">—</strong>
    </div>

    <!-- Budget -->
    <div class="sidebar-section">
      <span class="sidebar-label">🎯 Monthly Budget</span>
      <div class="budget-row">
        <input type="number" id="budgetInput" placeholder="e.g. 500" min="0" step="0.01">
        <button id="setBudgetBtn" class="btn btn-dark">Set</button>
      </div>
      <div id="budgetBarWrap" style="display:none">
        <div class="budget-bar"><div class="budget-bar-fill" id="budgetBarFill"></div></div>
        <span id="budgetWarning" class="budget-warning"></span>
      </div>
    </div>

    <!-- Chart -->
    <div class="sidebar-section">
      <span class="sidebar-label">📊 By Category</span>
      <div id="chart" class="chart"></div>
    </div>

    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Add Expense -->
    <div class="card">
      <h2 class="section-title">➕ Add Expense</h2>
      <div class="form-grid">
        <input type="text" id="descInput" placeholder="Description (e.g. Coffee)">
        <input type="number" id="amountInput" placeholder="Amount (e.g. 4.50)" min="0" step="0.01">
        <input type="text" id="noteInput" placeholder="Note (optional)">
        <select id="categoryInput">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Bills">🧾 Bills</option>
          <option value="Other">📦 Other</option>
        </select>
        <input type="date" id="dateInput">
        <button id="addBtn" class="btn btn-primary">+ Add Expense</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card">
      <h2 class="section-title">🔍 Search & Filter</h2>
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="🔍 Search...">
        <select id="filterCategory">
          <option value="All">All Categories</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Bills">🧾 Bills</option>
          <option value="Other">📦 Other</option>
        </select>
        <input type="month" id="filterMonth">
        <select id="sortBy">
          <option value="date-desc">Newest First</option>
          <option value="date-asc">Oldest First</option>
          <option value="amount-desc">Highest Amount</option>
          <option value="amount-asc">Lowest Amount</option>
        </select>
        <button id="clearFilter" class="btn btn-ghost">Clear</button>
        <button id="exportBtn" class="btn btn-dark">⬇ CSV</button>
      </div>
    </div>

    <!-- Expense List -->
    <div class="card">
      <h2 class="section-title">📝 Expenses</h2>
      <ul id="expenseList"></ul>
    </div>

  </main>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>✏️ Edit Expense</h2>
      <input type="text" id="editDesc" placeholder="Description">
      <input type="number" id="editAmount" placeholder="Amount" min="0" step="0.01">
      <input type="text" id="editNote" placeholder="Note (optional)">
      <select id="editCategory">
        <option value="Food">🍔 Food</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Health">💊 Health</option>
        <option value="Entertainment">🎬 Entertainment</option>
        <option value="Bills">🧾 Bills</option>
        <option value="Other">📦 Other</option>
      </select>
      <input type="date" id="editDate">
      <div class="modal-actions">
        <button id="saveEditBtn" class="btn btn-primary">Save</button>
        <button id="cancelEditBtn" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
